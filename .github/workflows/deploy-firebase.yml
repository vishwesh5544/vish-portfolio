name: Deploy To Firebase Hosting

on:
  # Run automatically whenever code is pushed to main.
  push:
    branches:
      - main

  # Allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:

# Avoid overlapping deploys to the same branch.
# If a newer commit is pushed while a deploy is running,
# the older deploy run will be canceled.
concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    env:
      # Opt in to Node.js 24 runtime for JavaScript-based GitHub Actions now,
      # instead of waiting for the platform-wide default switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Permissions required by actions/checkout and workflow internals.
    permissions:
      contents: read

    steps:
      # 1) Fetch repository code.
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2) Install Node.js and enable Yarn dependency cache.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      # 3) Install dependencies exactly from yarn.lock for reproducible builds.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 4) Build production assets into dist/ (as configured in firebase.json).
      - name: Build app
        run: yarn build

      # 5) Install Firebase CLI.
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 6) Materialize service-account JSON from GitHub Secret.
      #    Keep this secret value as the full JSON document.
      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "${{ github.workspace }}/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json" >> "$GITHUB_ENV"

      # 7) Deploy dist/ to Firebase Hosting live channel.
      - name: Deploy to Firebase Hosting (live)
        run: firebase deploy --only hosting --project vish-portfolio-9156b --non-interactive
